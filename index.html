<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ringcel | Electronics Distribution</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    :root{
      --bg:#050608;
      --bg-2:#0b0d12;
      --panel:rgba(255,255,255,.06);
      --panel-strong:rgba(255,255,255,.10);
      --line:rgba(255,255,255,.10);
      --text:#f5f7fb;
      --muted:rgba(245,247,251,.70);
      --accent:#0a84ff;
      --accent-2:#67e8f9;
      --shadow:0 22px 70px rgba(0,0,0,.38);
      --radius:28px;
      --radius-lg:36px;
    }

    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      font-family:'Inter',system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
      background:
        radial-gradient(circle at 18% 12%, rgba(10,132,255,.14), transparent 22%),
        radial-gradient(circle at 82% 4%, rgba(103,232,249,.10), transparent 20%),
        linear-gradient(180deg, #050608 0%, #07090d 48%, #040506 100%);
      color:var(--text);
      overflow-x:hidden;
      -webkit-font-smoothing:antialiased;
      text-rendering:optimizeLegibility;
    }

    a{text-decoration:none}
    img{max-width:100%; display:block}

    .navbar{
      background:rgba(7,9,13,.62);
      backdrop-filter:blur(20px);
      border-bottom:1px solid rgba(255,255,255,.08);
    }
    .navbar-brand{
      font-weight:800;
      letter-spacing:.24em;
      font-size:.9rem;
    }
    .nav-link{
      color:rgba(255,255,255,.78)!important;
      font-weight:500;
      font-size:.95rem;
      transition:.22s ease;
    }
    .nav-link:hover,
    .nav-link.active{color:#fff!important}
    .nav-link.active{position:relative}
    .nav-link.active::after{
      content:"";
      position:absolute;
      left:.55rem;
      right:.55rem;
      bottom:-.18rem;
      height:2px;
      border-radius:999px;
      background:linear-gradient(90deg,var(--accent),var(--accent-2));
    }

    .glass-card,
    .product-card,
    .category-card,
    .info-card,
    .panel-card,
    .story-block{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      backdrop-filter:blur(22px);
      overflow:hidden;
    }

    .btn-pill,
    .btn-accent,
    .btn-soft{
      border-radius:999px;
      padding:.9rem 1.2rem;
      font-weight:600;
      transition:.25s ease;
    }
    .btn-accent{
      background:linear-gradient(135deg,var(--accent),var(--accent-2));
      color:#04111f;
      border:none;
      box-shadow:0 14px 34px rgba(10,132,255,.25);
    }
    .btn-accent:hover{
      transform:translateY(-1px);
      filter:brightness(1.03);
      color:#04111f;
    }
    .btn-soft{
      color:#fff;
      border:1px solid rgba(255,255,255,.16);
      background:rgba(255,255,255,.06);
    }
    .btn-soft:hover{
      background:rgba(255,255,255,.10);
      color:#fff;
      transform:translateY(-1px);
    }

    .hero{
      min-height:100vh;
      display:grid;
      align-items:center;
      padding-top:88px;
      position:relative;
      overflow:hidden;
    }
    .hero::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at 50% 20%, rgba(255,255,255,.10), transparent 18%),
        radial-gradient(circle at 22% 30%, rgba(10,132,255,.18), transparent 16%),
        radial-gradient(circle at 78% 24%, rgba(103,232,249,.12), transparent 15%);
      pointer-events:none;
      opacity:.95;
    }
    .hero::after{
      content:"";
      position:absolute;
      inset:auto -10% -22% -10%;
      height:42vh;
      background:radial-gradient(circle, rgba(10,132,255,.20), transparent 68%);
      filter:blur(34px);
      pointer-events:none;
    }
    .hero-inner{
      position:relative;
      z-index:1;
      padding:2rem 0 4rem;
    }
    .hero-kicker{
      display:inline-flex;
      align-items:center;
      gap:.55rem;
      padding:.52rem .92rem;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(255,255,255,.06);
      color:#fff;
      font-size:.88rem;
      letter-spacing:.01em;
      backdrop-filter:blur(14px);
    }
    .hero h1{
      font-size:clamp(2.9rem,7vw,6.2rem);
      line-height:1.01;
      font-weight:800;
      letter-spacing:-.055em;
      margin:1rem 0 1rem;
      max-width:12ch;
    }
    .hero .lead{
      color:var(--muted);
      max-width:46rem;
      font-size:1.08rem;
      line-height:1.8;
    }

    .metric{
      padding:1rem 1.05rem;
      border-radius:22px;
      border:1px solid rgba(255,255,255,.09);
      background:rgba(255,255,255,.05);
      text-align:left;
    }
    .metric .num{
      font-size:1.4rem;
      font-weight:800;
      letter-spacing:-.03em;
    }
    .metric .label{
      color:var(--muted);
      font-size:.88rem;
      margin-top:.15rem;
    }

    .section-pad{padding:5rem 0}
    .section-title{
      font-size:clamp(1.8rem, 4vw, 3.1rem);
      line-height:1.05;
      font-weight:800;
      letter-spacing:-.045em;
      margin:0;
    }
    .section-sub{
      color:var(--muted);
      max-width:52rem;
      font-size:1.02rem;
      line-height:1.75;
    }

    .chip{
      display:inline-flex;
      align-items:center;
      gap:.5rem;
      padding:.72rem 1rem;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.13);
      background:rgba(255,255,255,.05);
      color:#fff;
      transition:.22s ease;
      white-space:nowrap;
      cursor:pointer;
      user-select:none;
    }
    .chip:hover{transform:translateY(-2px); background:rgba(255,255,255,.09); color:#fff}
    .chip.active{
      background:rgba(10,132,255,.14);
      border-color:rgba(10,132,255,.22);
    }

    .category-card{
      cursor:pointer;
      transition:.30s ease;
      height:100%;
      position:relative;
    }
    .category-card:hover{
      transform:translateY(-8px);
      border-color:rgba(103,232,249,.24);
      box-shadow:0 26px 76px rgba(0,0,0,.44);
    }
    .category-art{
      height:260px;
      position:relative;
      display:grid;
      place-items:center;
      background:
        radial-gradient(circle at 50% 22%, rgba(255,255,255,.10), transparent 34%),
        linear-gradient(135deg, rgba(10,132,255,.20), rgba(255,255,255,.03));
      overflow:hidden;
    }
    .category-art img{
      width:100%;
      height:100%;
      object-fit:contain;
      padding:1.25rem;
      filter:drop-shadow(0 18px 30px rgba(0,0,0,.34));
      transform:scale(1.01);
    }
    .category-pill{
      position:absolute;
      top:14px;
      left:14px;
      font-size:.78rem;
      background:rgba(0,0,0,.44);
      border:1px solid rgba(255,255,255,.12);
      padding:.36rem .72rem;
      border-radius:999px;
      z-index:2;
    }
    .category-card h3{font-size:1.15rem; letter-spacing:-.02em}
    .category-card p{color:var(--muted); line-height:1.7}

    .product-card{
      transition:.28s ease;
      height:100%;
    }
    .product-card:hover{
      transform:translateY(-6px);
      border-color:rgba(255,255,255,.16);
    }
    .product-image{
      position:relative;
      min-height:285px;
      display:grid;
      place-items:center;
      padding:1rem;
      background:
        radial-gradient(circle at 50% 22%, rgba(255,255,255,.10), transparent 34%),
        linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.03));
      overflow:hidden;
    }
    .product-image img{
      width:100%;
      height:100%;
      object-fit:contain;
      max-height:250px;
      filter:drop-shadow(0 16px 28px rgba(0,0,0,.28));
      transform:translateZ(0);
    }
    .product-body{
      padding:1.1rem 1.1rem 1.2rem;
    }
    .product-name{
      font-size:1.1rem;
      font-weight:700;
      letter-spacing:-.02em;
      line-height:1.2;
      margin:0;
    }
    .product-meta{
      color:var(--muted);
      font-size:.92rem;
      line-height:1.55;
    }
    .price{
      font-weight:800;
      letter-spacing:-.02em;
      font-size:1.08rem;
    }

    .badge-soft{
      display:inline-flex;
      align-items:center;
      gap:.35rem;
      background:rgba(10,132,255,.12);
      color:#bde1ff;
      border:1px solid rgba(10,132,255,.16);
      border-radius:999px;
      padding:.35rem .65rem;
      font-size:.78rem;
      white-space:nowrap;
    }
    .badge-dark{
      background:rgba(255,255,255,.07);
      color:#fff;
      border-color:rgba(255,255,255,.10);
    }

    .input-group .form-control,
    .form-control,
    .form-select{
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.14);
      color:#fff;
      border-radius:14px;
    }
    .input-group .form-control::placeholder,
    .form-control::placeholder{color:rgba(255,255,255,.45)}
    .input-group .form-control:focus,
    .form-control:focus,
    .form-select:focus{
      background:rgba(255,255,255,.07);
      color:#fff;
      border-color:rgba(103,232,249,.46);
      box-shadow:0 0 0 .22rem rgba(10,132,255,.14);
    }
    .form-select option{color:#111;}

    .page-top{
      padding-top:7.8rem;
      padding-bottom:2rem;
    }

    .hero-shell{
      border-radius:var(--radius-lg);
      border:1px solid rgba(255,255,255,.10);
      background:
        radial-gradient(circle at 50% 20%, rgba(255,255,255,.14), transparent 20%),
        linear-gradient(135deg, rgba(255,255,255,.06), rgba(255,255,255,.02));
      overflow:hidden;
    }

    .section-grid{
      display:grid;
      grid-template-columns:repeat(12, minmax(0, 1fr));
      gap:1.2rem;
    }

    .feature-block{
      grid-column:span 4;
      padding:1.25rem;
      border-radius:24px;
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.08);
    }
    .feature-block strong{
      display:block;
      margin-bottom:.35rem;
      font-size:1rem;
    }
    .feature-block span{
      color:var(--muted);
      font-size:.94rem;
      line-height:1.65;
    }

    .section-sticky{
      position:sticky;
      top:98px;
    }

    .product-hero{
      position:relative;
      overflow:hidden;
      border-radius:var(--radius-lg);
      border:1px solid rgba(255,255,255,.10);
      background:
        radial-gradient(circle at 50% 15%, rgba(255,255,255,.12), transparent 25%),
        linear-gradient(135deg, rgba(255,255,255,.07), rgba(255,255,255,.03));
      min-height:520px;
      display:grid;
      align-items:center;
    }
    .product-hero img{
      width:100%;
      max-height:470px;
      object-fit:contain;
      padding:1.6rem;
      filter:drop-shadow(0 26px 34px rgba(0,0,0,.34));
    }

    .spec-grid{
      display:grid;
      grid-template-columns:repeat(2, minmax(0, 1fr));
      gap:1rem;
    }
    .spec{
      padding:1rem 1rem 1.05rem;
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.08);
      border-radius:18px;
    }
    .spec .k{
      color:var(--muted);
      font-size:.82rem;
      margin-bottom:.28rem;
    }
    .spec .v{
      font-size:.98rem;
      font-weight:600;
      letter-spacing:-.01em;
    }

    .story-block{
      border-radius:var(--radius-lg);
      background:linear-gradient(135deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      border:1px solid rgba(255,255,255,.08);
      padding:1.2rem;
      position:relative;
      overflow:hidden;
    }

    .story-mosaic{
      display:grid;
      grid-template-columns:1.2fr .8fr;
      gap:1rem;
    }
    .mosaic-image{
      min-height:330px;
      border-radius:28px;
      border:1px solid rgba(255,255,255,.10);
      background:
        radial-gradient(circle at 50% 25%, rgba(255,255,255,.10), transparent 30%),
        linear-gradient(180deg, rgba(255,255,255,.07), rgba(255,255,255,.03));
      overflow:hidden;
      display:grid;
      place-items:center;
      position:relative;
    }
    .mosaic-image img{
      width:100%;
      height:100%;
      object-fit:contain;
      padding:1.25rem;
      filter:drop-shadow(0 18px 30px rgba(0,0,0,.30));
    }

    .scroll-reveal{
      opacity:0;
      transform:translateY(18px);
      transition:opacity .7s ease, transform .7s ease;
      will-change:opacity, transform;
    }
    .scroll-reveal.visible{
      opacity:1;
      transform:translateY(0);
    }

    .float-soft{
      animation:floatSoft 6.5s ease-in-out infinite;
    }
    @keyframes floatSoft{
      0%,100%{transform:translateY(0)}
      50%{transform:translateY(-10px)}
    }

    .cart-fab{
      position:fixed;
      right:18px;
      bottom:18px;
      width:58px;
      height:58px;
      border-radius:50%;
      display:grid;
      place-items:center;
      z-index:1040;
      border:none;
      box-shadow:0 18px 36px rgba(0,0,0,.36);
      background:linear-gradient(135deg,var(--accent),var(--accent-2));
      color:#04111f;
      font-weight:800;
    }

    .offcanvas,
    .modal-content{
      background:#06080c;
      color:#fff;
      border:1px solid rgba(255,255,255,.10);
    }
    .offcanvas-header,
    .modal-header,
    .modal-footer{
      border-color:rgba(255,255,255,.10)!important;
    }

    .qty-btn{
      width:34px;
      height:34px;
      border-radius:10px;
      border:1px solid rgba(255,255,255,.14);
      background:rgba(255,255,255,.06);
      color:#fff;
      font-size:1rem;
    }

    .empty-state{
      border:1px dashed rgba(255,255,255,.16);
      background:rgba(255,255,255,.04);
      border-radius:24px;
      padding:2rem;
      color:var(--muted);
    }

    .fade-up{
      animation:fadeUp .6s ease both;
    }
    @keyframes fadeUp{
      from{opacity:0; transform:translateY(14px)}
      to{opacity:1; transform:translateY(0)}
    }

    .divider{
      height:1px;
      background:linear-gradient(90deg, transparent, rgba(255,255,255,.14), transparent);
      margin:1.2rem 0;
    }

    .hover-lift{
      transition:transform .25s ease, box-shadow .25s ease, border-color .25s ease;
    }
    .hover-lift:hover{
      transform:translateY(-4px);
      box-shadow:0 24px 60px rgba(0,0,0,.32);
    }

    .inline-tag{
      display:inline-flex;
      align-items:center;
      gap:.4rem;
      padding:.34rem .62rem;
      border-radius:999px;
      font-size:.78rem;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.10);
      color:#fff;
    }

    .top-strip{
      display:flex;
      flex-wrap:wrap;
      gap:.6rem;
    }

    @media (max-width: 991px){
      .hero{min-height:auto; padding-bottom:3rem}
      .story-mosaic{grid-template-columns:1fr}
      .spec-grid{grid-template-columns:1fr}
      .section-sticky{position:relative; top:auto}
      .feature-block{grid-column:span 12}
    }
  </style>
</head>

    const STORAGE_KEY = 'ringcel_cart_v2';

    const cartDrawer = new bootstrap.Offcanvas('#cartDrawer');

    const currency = (value) => `₹${Number(value).toLocaleString('en-IN')}`;

    function loadCart(){
      const saved = localStorage.getItem(STORAGE_KEY);
      if(!saved) return [];
      try{
        const parsed = JSON.parse(saved);
        return Array.isArray(parsed) ? parsed : [];
      }catch{
        return [];
      }
    }

    function saveCart(){
      localStorage.setItem(STORAGE_KEY, JSON.stringify(cart));
      updateCartBadge();
    }

    function currentRoute(){
      const hash = location.hash.replace('#','') || 'home';
      const [route, param] = hash.split('/');
      return { route, param };
    }

    function setActiveNav(){
      document.querySelectorAll('.nav-link').forEach(a => a.classList.remove('active'));
      const { route, param } = currentRoute();
      const target = route === 'category' && param ? `#category/${param}` : `#${route}`;
      const match = document.querySelector(`.nav-link[href="${target}"]`);
      if (match) match.classList.add('active');
    }

    function updateCartBadge(){
      const count = cart.reduce((sum, item) => sum + item.qty, 0);
      document.getElementById('cartCount').textContent = count;
    }

    function addToCart(id){
      const item = cart.find(x => x.id === id);
      if(item) item.qty += 1;
      else cart.push({ id, qty: 1 });
      saveCart();
      renderCart();
    }

    function decrementCart(id){
      const item = cart.find(x => x.id === id);
      if(!item) return;
      item.qty -= 1;
      if(item.qty <= 0) cart = cart.filter(x => x.id !== id);
      saveCart();
      renderCart();
    }

    function openCart(){
      renderCart();
      cartDrawer.show();
    }

    function renderCart(){
      const container = document.getElementById('cartItems');
      const totalEl = document.getElementById('cartTotal');
      if(!container || !totalEl) return;

      if(!cart.length){
        container.innerHTML = `<div class="empty-state">Your quotation list is empty.</div>`;
        totalEl.textContent = currency(0);
        return;
      }

      let total = 0;
      container.innerHTML = cart.map(item => {
        const p = products.find(x => x.id === item.id);
        if(!p) return '';
        total += p.price * item.qty;
        return `
          <div class="glass-card p-3">
            <div class="d-flex gap-3 align-items-center">
              <img src="${p.image}" alt="${p.name}" style="width:72px;height:72px;object-fit:contain;border-radius:18px;background:rgba(255,255,255,.05);padding:.35rem;">
              <div class="flex-grow-1">
                <div class="fw-semibold">${p.name}</div>
                <div class="text-secondary small">${currency(p.price)}</div>
                <div class="d-flex align-items-center gap-2 mt-2">
                  <button class="qty-btn" onclick="decrementCart('${p.id}')">−</button>
                  <span>${item.qty}</span>
                  <button class="qty-btn" onclick="addToCart('${p.id}')">+</button>
                </div>
              </div>
            </div>
          </div>
        `;
      }).join('');

      totalEl.textContent = currency(total);
    }

    function getFilteredProducts(filterCategory = null){
      const q = (searchInput.value || '').trim().toLowerCase();
      return products.filter(p => {
        const matchesCategory = filterCategory ? p.category === filterCategory : true;
        const matchesSearch = !q || [p.name, p.brand, p.desc, categories[p.category]?.name].join(' ').toLowerCase().includes(q);
        return matchesCategory && matchesSearch;
      });
    }

    function sortProducts(items, sortValue){
      const arr = [...items];
      switch(sortValue){
        case 'price-asc':
          return arr.sort((a,b)=>a.price-b.price);
        case 'price-desc':
          return arr.sort((a,b)=>b.price-a.price);
        case 'name':
          return arr.sort((a,b)=>a.name.localeCompare(b.name));
        case 'popular':
          return arr.sort((a,b)=>(b.popular===true)-(a.popular===true));
        default:
          return arr;
      }
    }

      navSearchWrap.style.display = visible ? 'flex' : 'none';
    }

    function renderRoute(){
      const { route, param } = currentRoute();
      setActiveNav();
      setNavSearchVisible(route === 'home' || route === 'category');

      if(route === 'category' && param) renderCategoryPage(param);
      else if(route === 'product' && param) renderProductPage(param);
      else if(route === 'about') renderAboutPage();
      else if(route === 'contact') renderContactPage();
      else renderHomePage();

      updateCartBadge();
      renderCart();
      observeReveal();
      setupHeroMotion();
      window.scrollTo(0, 0);
    }

      return `
        <div class="col-md-6 col-xl-4">
          <div class="product-card scroll-reveal">
            <div class="product-image" onclick="location.hash='product/${p.id}'" style="cursor:pointer;">
              <img src="${p.image}" alt="${p.name}">
            </div>
            <div class="product-body">
              <div class="d-flex align-items-center justify-content-between gap-2 mb-2">
                <span class="badge-soft">${categories[p.category].name}</span>
                ${p.popular ? '<span class="badge-soft badge-dark">Featured</span>' : ''}
              </div>
              <h3 class="product-name mb-2">${p.name}</h3>
              <div class="product-meta mb-2">${p.brand}</div>
              <p class="product-meta mb-3">${p.desc}</p>
              <div class="d-flex justify-content-between align-items-center gap-2">
                <div class="price">${currency(p.price)}</div>
                <div class="d-flex gap-2">
                  <button class="btn btn-sm btn-soft" onclick="location.hash='product/${p.id}'">View</button>
                  <button class="btn btn-sm btn-accent" onclick="addToCart('${p.id}')">Save</button>
                </div>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function observeReveal(){
      const items = document.querySelectorAll('.scroll-reveal');
      const io = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if(entry.isIntersecting) entry.target.classList.add('visible');
        });
      }, { threshold: 0.12 });

      items.forEach(el => io.observe(el));
    }

    function setupHeroMotion(){
      const hero = document.querySelector('.hero');
      if(!hero) return;

      const onScroll = () => {
        const y = window.scrollY || 0;
        const offset1 = Math.min(y * 0.04, 24);
        const offset2 = Math.min(y * 0.02, 14);
        hero.style.setProperty('--heroY1', `${offset1}px`);
        hero.style.setProperty('--heroY2', `${offset2}px`);
      };

      if(setupHeroMotion._handler){
        window.removeEventListener('scroll', setupHeroMotion._handler);
      }
      setupHeroMotion._handler = onScroll;
      window.addEventListener('scroll', onScroll, { passive:true });
      onScroll();
    }

    function setQuickFilter(mode){
      if(location.hash !== '#home') location.hash = '#home';

      if(mode === 'all'){
        searchInput.value = '';
        renderRoute();
        return;
      }

      if(mode === 'popular'){
        searchInput.value = 'featured';
        renderRoute();
        return;
      }

      if(mode === 'price-asc' || mode === 'price-desc'){
        const items = sortProducts(getFilteredProducts(), mode);
        app.querySelectorAll('.product-card').forEach(el => el.remove());
        app.querySelector('.row.g-4')?.replaceChildren();
        return;
      }
    }

    function copyLink(){
      navigator.clipboard?.writeText(location.href).then(() => {
        alert('Link copied.');
      }).catch(() => {
        alert('Copy not available on this device.');
      });
    }

    window.addToCart = addToCart;
    window.decrementCart = decrementCart;
    window.openCart = openCart;
    window.setQuickFilter = setQuickFilter;
    window.copyLink = copyLink;

    window.addEventListener('hashchange', renderRoute);
    window.addEventListener('load', () => {
      if(!location.hash) location.hash = '#home';
      updateCartBadge();
      renderRoute();
    });
  </script>
</body>
</html>
